<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rylia | Bientôt disponible</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 { font-size: 3rem; margin-bottom: 0.5rem; letter-spacing: 2px; }
        p { font-size: 1.2rem; color: #a2a8d3; margin-bottom: 2rem; }
        .links { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .btn {
            padding: 10px 20px;
            border: 1px solid #4ecca3;
            color: #4ecca3;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s;
        }
        .btn:hover { background: #4ecca3; color: #1a1a2e; }
        .footer { position: absolute; bottom: 20px; font-size: 0.8rem; opacity: 0.5; }
    </style>
</head>
<body>

    <h1>RYLIA</h1>
    <p>Le site officiel est en cours de préparation.</p>

    <div class="links">
        <a href="/roue" class="btn">Projet Roue</a>
        <a href="/carte" class="btn">Projet Carte</a>
        <a href="/fidelite" class="btn">Projet Fidélité</a>
    </div>

    <div class="footer">
        &copy; 2026 Prototype-Rylia - rylia.fr
    </div>

</body>
</html>
